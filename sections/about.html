<section id="about" class="section about">

      <div class="about__content fade-left">

          <h3 data-i18n="aboutStoryTitle">...</h3>

          </div>
        </div>
        <blockquote class="about__quote glass-card fade-up">
          <p data-i18n="founderMessage">"..."</p>
          <cite data-i18n="founderName">...</cite>
        </blockquote>
      </div>
